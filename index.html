<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanglish Cloud Secure</title>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") no-repeat center center/cover;
color:white;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
z-index:-1;
}

.container{
max-width:750px;
margin:40px auto;
padding:30px;
border-radius:20px;
background:rgba(0,0,0,0.75);
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:#667eea;
color:white;
cursor:pointer;
}

.word-item{
display:flex;
justify-content:space-between;
background:#222;
padding:8px;
margin-top:5px;
border-radius:8px;
}

.hidden{display:none;}

#loginScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
}

.login-box{
background:#111;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}

#suggestions div{
background:#333;
padding:6px;
margin-top:4px;
border-radius:6px;
cursor:pointer;
}
#suggestions div:hover{background:#555;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="login-box">
<h3>Admin Login</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN -->
<div id="mainApp" class="hidden">
<div class="container">

<h2>Tanglish Cloud</h2>

<button onclick="logout()">Logout</button>

<h3>Search</h3>
<input type="text" id="searchBox" placeholder="Type word...">
<div id="suggestions"></div>

<h3>Add Word</h3>
<input type="text" id="wrongWord" placeholder="Wrong spelling">
<input type="text" id="correctWord" placeholder="Correct spelling">
<button onclick="addWord()">Add</button>

<h3>Word List</h3>
<div id="wordList"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
messagingSenderId: "YOUR_MSG_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let words = [];
let fuse = null;

/* LOGIN */
window.login = async function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,password);
}catch(e){
alert(e.message);
}
};

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
};

/* AUTH */
onAuthStateChanged(auth,user=>{
if(user){
loginScreen.style.display="none";
mainApp.classList.remove("hidden");
}else{
loginScreen.style.display="flex";
mainApp.classList.add("hidden");
}
});

/* FIRESTORE REALTIME */
onSnapshot(collection(db,"words"), snapshot=>{
words = snapshot.docs.map(d=>({id:d.id,...d.data()}));
fuse = new Fuse(words,{keys:["wrong"],threshold:0.3});
render();
});

/* ADD */
window.addWord = async function(){
let w = wrongWord.value.trim();
let c = correctWord.value.trim();
if(!w || !c) return;

await addDoc(collection(db,"words"),{wrong:w,correct:c});

wrongWord.value="";
correctWord.value="";
};

/* DELETE */
window.del = async function(id){
await deleteDoc(doc(db,"words",id));
};

/* EDIT */
window.edit = async function(id){
let nw = prompt("Wrong:");
let nc = prompt("Correct:");
await updateDoc(doc(db,"words",id),{wrong:nw,correct:nc});
};

/* DISPLAY */
function render(){
wordList.innerHTML="";
words.forEach(w=>{
wordList.innerHTML += `
<div class="word-item">
<span>${w.wrong} → ${w.correct}</span>
<div>
<button onclick="edit('${w.id}')">Edit</button>
<button onclick="del('${w.id}')">Delete</button>
</div>
</div>`;
});
}

/* SEARCH + SUGGESTION */
searchBox.addEventListener("input",function(){
suggestions.innerHTML="";
if(!this.value || !fuse) return;

let res = fuse.search(this.value);

res.slice(0,5).forEach(r=>{
let div = document.createElement("div");
div.innerText = r.item.correct;

div.onclick = ()=>{
searchBox.value = r.item.correct;
suggestions.innerHTML="";
};

suggestions.appendChild(div);
});
});

</script>

</body>
</html>
