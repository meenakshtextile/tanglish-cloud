<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanglish Cloud Fixed</title>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") no-repeat center center/cover;
color:white;
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
z-index:-1;
}
.container{
max-width:750px;
margin:40px auto;
padding:30px;
border-radius:20px;
background:rgba(0,0,0,0.75);
}
input,button,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}
button{
background:#667eea;
color:white;
cursor:pointer;
}
.word-item{
display:flex;
justify-content:space-between;
background:#222;
padding:8px;
margin-top:5px;
border-radius:8px;
}
.hidden{display:none;}

#loginScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
}

.login-box{
background:#111;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h3>Admin Login</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="mainApp" class="hidden">
<div class="container">

<h2>Tanglish Cloud</h2>
<button onclick="logout()">Logout</button>

<h3>Auto Correct</h3>
<textarea id="inputText" rows="4"></textarea>
<button onclick="autoCorrect()">Correct</button>

<h4>Output</h4>
<div id="outputText"></div>

<h3>Add Word</h3>
<input id="wrongWord" placeholder="wrong">
<input id="correctWord" placeholder="correct">
<button onclick="addWord()">Add</button>

<h3>Word List</h3>
<div id="wordList"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSy....",
authDomain: "tanglish-cloud.firebaseapp.com",
projectId: "tanglish-cloud",
storageBucket: "tanglish-cloud.appspot.com",
messagingSenderId: "194420258349",
appId: "1:194420258349:web:97d24c1c7d8cc9e31ceaa4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let words = [];

onAuthStateChanged(auth,(user)=>{
document.getElementById("loginScreen").style.display = user ? "none":"flex";
document.getElementById("mainApp").classList.toggle("hidden", !user);
});

window.login = async () => {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
await signInWithEmailAndPassword(auth,email,password);
};

window.logout = () => signOut(auth);

onSnapshot(collection(db,"words"), snap=>{
words = [];
snap.forEach(d=>words.push(d.data()));
});

window.autoCorrect = function(){
let text = document.getElementById("inputText").value.toLowerCase();

words.sort((a,b)=>b.wrong.length - a.wrong.length);

words.forEach(w=>{
const regex = new RegExp("\\b"+w.wrong.replace(/[.*+?^${}()|[\\]\\]/g,'\\$&')+"\\b","gi");
text = text.replace(regex, w.correct);
});

document.getElementById("outputText").innerText = text;
};

window.addWord = async function(){
const wrong = document.getElementById("wrongWord").value;
const correct = document.getElementById("correctWord").value;
await addDoc(collection(db,"words"),{wrong,correct});
};

</script>
</body>
</html>
