<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanglish Cloud Basic</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#111;
  color:white;
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
  background:#222;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

button{
  background:#667eea;
  color:white;
  cursor:pointer;
}

.word-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#333;
  margin-top:5px;
  border-radius:6px;
}

.word-item button{
  width:auto;
  margin-left:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Tanglish Word Manager</h2>

<!-- ADD WORD -->
<h3>Add Word</h3>
<input id="wrongWord" placeholder="Wrong word">
<input id="correctWord" placeholder="Correct word">
<button onclick="addWord()">Add</button>

<!-- WORD LIST -->
<h3>Word List</h3>
<div id="wordList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG (REPLACE THIS PROPERLY) */
const firebaseConfig = {
  apiKey: "AIzaSyAdBaim-RFyd1QhXiTkKr2RSPGxmis8mFA",
  authDomain: "tanglish-cloud.firebaseapp.com",
  projectId: "tanglish-cloud",
  storageBucket: "tanglish-cloud.firebasestorage.app",
  messagingSenderId: "194420258349",
  appId: "1:194420258349:web:97d24c1c7d8cc9e31ceaa4",
  measurementId: "G-Y7G9XNJBH6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let words = [];

/* LOAD DATA REALTIME */
onSnapshot(collection(db, "words"), (snapshot) => {
  words = [];

  snapshot.forEach((d) => {
    words.push({ id: d.id, ...d.data() });
  });

  renderWords();
});

/* ➕ ADD WORD */
window.addWord = async function () {
  const wrong = document.getElementById("wrongWord").value.trim();
  const correct = document.getElementById("correctWord").value.trim();

  if (!wrong || !correct) {
    alert("Fill both fields");
    return;
  }

  await addDoc(collection(db, "words"), {
    wrong,
    correct
  });

  document.getElementById("wrongWord").value = "";
  document.getElementById("correctWord").value = "";
};

/* ❌ DELETE WORD */
window.deleteWord = async function (id) {
  if (confirm("Delete this word?")) {
    await deleteDoc(doc(db, "words", id));
  }
};

/* ✏️ EDIT WORD */
window.editWord = async function (id, oldWrong, oldCorrect) {

  const newWrong = prompt("Edit wrong word:", oldWrong);
  const newCorrect = prompt("Edit correct word:", oldCorrect);

  if (!newWrong || !newCorrect) return;

  await updateDoc(doc(db, "words", id), {
    wrong: newWrong,
    correct: newCorrect
  });
};

/* 📋 DISPLAY */
function renderWords() {
  const box = document.getElementById("wordList");
  box.innerHTML = "";

  words.forEach((w) => {
    const div = document.createElement("div");
    div.className = "word-item";

    div.innerHTML = `
      <span>${w.wrong} → ${w.correct}</span>
      <div>
        <button onclick="editWord('${w.id}','${w.wrong}','${w.correct}')">Edit</button>
        <button onclick="deleteWord('${w.id}')">Delete</button>
      </div>
    `;

    box.appendChild(div);
  });
}

</script>

</body>
</html>
