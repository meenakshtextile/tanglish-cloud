<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanglish Cloud Fixed</title>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") no-repeat center center/cover;
color:white;
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
z-index:-1;
}
.container{
max-width:750px;
margin:40px auto;
padding:30px;
border-radius:20px;
background:rgba(0,0,0,0.75);
}
input,button,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}
button{
background:#667eea;
color:white;
cursor:pointer;
}
.word-item{
display:flex;
justify-content:space-between;
background:#222;
padding:8px;
margin-top:5px;
border-radius:8px;
}
.hidden{display:none;}

#loginScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
}

.login-box{
background:#111;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h3>Admin Login</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="mainApp" class="hidden">
<div class="container">

<h2>Tanglish Cloud</h2>
<button onclick="logout()">Logout</button>

<h3>Auto Correct</h3>
<textarea id="inputText" rows="4"></textarea>
<button onclick="autoCorrect()">Correct</button>

<h4>Output</h4>
<div id="outputText"></div>

<h3>Add Word</h3>
<input id="wrongWord" placeholder="wrong">
<input id="correctWord" placeholder="correct">
<button onclick="addWord()">Add</button>

<h3>Word List</h3>
<div id="wordList"></div>

</div>
</div>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyAdBaim-RFyd1QhXiTkKr2RSPGxmis8mFA",
  authDomain: "tanglish-cloud.firebaseapp.com",
  projectId: "tanglish-cloud",
  storageBucket: "tanglish-cloud.firebasestorage.app",
  messagingSenderId: "194420258349",
  appId: "1:194420258349:web:97d24c1c7d8cc9e31ceaa4",
  measurementId: "G-Y7G9XNJBH6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* UI elements */
const loginScreen = document.getElementById("loginScreen");
const mainApp = document.getElementById("mainApp");
const wordList = document.getElementById("wordList");

let words = [];

/* LOGIN */
window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    alert(e.message);
  }
};

/* LOGOUT */
window.logout = async function () {
  await signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginScreen.style.display = "none";
    mainApp.classList.remove("hidden");
  } else {
    loginScreen.style.display = "flex";
    mainApp.classList.add("hidden");
  }
});

/* LOAD WORDS */
onSnapshot(collection(db, "words"), (snapshot) => {
  words = [];
  snapshot.forEach((d) => {
    words.push({ id: d.id, ...d.data() });
  });
  displayWords();
});

/* AUTO CORRECT (SAFE VERSION) */
window.autoCorrect = function () {
  let text = document.getElementById("inputText").value.toLowerCase();

  words.sort((a, b) => b.wrong.length - a.wrong.length);

  words.forEach((w) => {
    const regex = new RegExp(
      "\\b" + w.wrong.replace(/[.*+?^${}()|[\\]\\]/g, "\\$&") + "\\b",
      "gi"
    );
    text = text.replace(regex, w.correct);
  });

  document.getElementById("outputText").innerText = text;
};

/* ADD WORD */
window.addWord = async function () {
  const wrong = document.getElementById("wrongWord").value.trim();
  const correct = document.getElementById("correctWord").value.trim();

  if (!wrong || !correct) return;

  await addDoc(collection(db, "words"), { wrong, correct });

  document.getElementById("wrongWord").value = "";
  document.getElementById("correctWord").value = "";
};

/* DELETE */
window.deleteWord = async function (id) {
  await deleteDoc(doc(db, "words", id));
};

/* DISPLAY */
function displayWords() {
  wordList.innerHTML = "";

  words.forEach((w) => {
    const div = document.createElement("div");
    div.className = "word-item";

    div.innerHTML = `
      <span>${w.wrong} → ${w.correct}</span>
      <div>
        <button onclick="deleteWord('${w.id}')">Delete</button>
      </div>
    `;

    wordList.appendChild(div);
  });
}

</script>
