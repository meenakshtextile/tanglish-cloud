<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanglish Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#111;
color:white;
}
.container{
max-width:700px;
margin:40px auto;
padding:20px;
background:#222;
border-radius:10px;
}
input,button,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}
button{background:#667eea;color:white;cursor:pointer;}
.word-item{
display:flex;
justify-content:space-between;
background:#333;
padding:8px;
margin-top:5px;
border-radius:6px;
}
  #suggestions div{
background:#333;
padding:8px;
margin-top:4px;
border-radius:6px;
cursor:pointer;
}
#suggestions div:hover{
background:#555;
}
</style>
</head>

<body>

<div class="container">
<h2>Tanglish Cloud</h2>

<h3>Search</h3>
<input id="searchBox" placeholder="search word">
  <h3>Search</h3>
<input id="searchBox" placeholder="Type word...">
<div id="suggestions"></div>

<h3>Auto Correct</h3>
<textarea id="textInput" rows="4"></textarea>
<button onclick="autoCorrect()">Correct</button>
<div id="output"></div>

<h3>Add Word</h3>
<input id="wrong">
<input id="correct">
<button onclick="addWord()">Add</button>

<h3>Word List</h3>
<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, deleteDoc, doc,
onSnapshot, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
const firebaseConfig = {
  apiKey: "AIzaSyAdBaim-RFyd1QhXiTkKr2RSPGxmis8mFA",
  authDomain: "tanglish-cloud.firebaseapp.com",
  projectId: "tanglish-cloud",
  storageBucket: "tanglish-cloud.firebasestorage.app",
  messagingSenderId: "194420258349",
  appId: "1:194420258349:web:97d24c1c7d8cc9e31ceaa4",
  measurementId: "G-Y7G9XNJBH6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let words = [];
let fuse = null;

// realtime
onSnapshot(collection(db,"words"), snap=>{
words = snap.docs.map(d=>({id:d.id,...d.data()}));
fuse = new Fuse(words,{keys:["wrong"],threshold:0.3});
render();
});
  let fuse = new Fuse(words, {
  keys: ["wrong"],
  threshold: 0.3
});

// ADD
window.addWord = async ()=>{
let w=document.getElementById("wrong").value;
let c=document.getElementById("correct").value;
await addDoc(collection(db,"words"),{wrong:w,correct:c});
document.getElementById("wrong").value="";
document.getElementById("correct").value="";
};

// DELETE
window.del = async (id)=>{
await deleteDoc(doc(db,"words",id));
};

// EDIT
window.edit = async (id)=>{
let nw=prompt("wrong");
let nc=prompt("correct");
await updateDoc(doc(db,"words",id),{
wrong:nw,
correct:nc
});
};

// AUTO CORRECT (FIXED)
window.autoCorrect = ()=>{
let text=document.getElementById("textInput").value;
if(!text) return;

words.forEach(w=>{
let regex=new RegExp("\\b"+w.wrong+"\\b","gi");
text=text.replace(regex,w.correct);
});

document.getElementById("output").innerText=text;
};

// SEARCH
document.getElementById("searchBox").addEventListener("input",function(){
if(!fuse) return;
let res=fuse.search(this.value);
console.log(res);
});
  document.getElementById("searchBox").addEventListener("input", function () {
  let box = document.getElementById("suggestions");
  box.innerHTML = "";

  if (!this.value || !fuse) return;

  let results = fuse.search(this.value);

  results.slice(0, 5).forEach(r => {
    let div = document.createElement("div");
    div.innerText = r.item.correct;

    // click suggestion
    div.onclick = () => {
      document.getElementById("searchBox").value = r.item.correct;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
});

// UI
function render(){
let box=document.getElementById("list");
box.innerHTML="";
words.forEach(w=>{
box.innerHTML+=`
<div class="word-item">
<span>${w.wrong} → ${w.correct}</span>
<div>
<button onclick="edit('${w.id}')">Edit</button>
<button onclick="del('${w.id}')">Delete</button>
</div>
</div>`;
});
}

</script>

</body>
</html>
