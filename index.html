<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanglish Cloud Secure</title>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") no-repeat center center/cover;
color:white;
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
z-index:-1;
}
.container{
max-width:750px;
margin:40px auto;
padding:30px;
border-radius:20px;
background:rgba(0,0,0,0.75);
}
input,button,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}
button{
background:#667eea;
color:white;
cursor:pointer;
}
button:hover{
opacity:0.9;
}
.word-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
padding:8px;
margin-top:5px;
border-radius:8px;
}
.hidden{display:none;}
#loginScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
}
.login-box{
background:#111;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}
#suggestions div{
background:#333;
padding:6px;
margin-top:4px;
border-radius:6px;
cursor:pointer;
}
#suggestions div:hover{
background:#555;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="login-box">
<h3>Admin Login</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">
<div class="container">

<h2>Tanglish Cloud</h2>
<button onclick="logout()">Logout</button>

<h3>Search</h3>
<input type="text" id="searchBox" placeholder="Type word...">
<div id="suggestions"></div>

<h3>Auto Correct Text</h3>
<textarea id="inputText" rows="4" placeholder="Type Tanglish sentence..."></textarea>
<button onclick="autoCorrect()">Correct Text</button>

<h4>Corrected Output:</h4>
<div id="outputText" style="background:#111;padding:10px;border-radius:8px;"></div>

<h3>Add Word</h3>
<input type="text" id="wrongWord" placeholder="Wrong spelling">
<input type="text" id="correctWord" placeholder="Correct spelling">
<button onclick="addWord()">Add</button>

<h3>Word List</h3>
<div id="wordList"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdBaim-RFyd1QhXiTkKr2RSPGxmis8mFA",
  authDomain: "tanglish-cloud.firebaseapp.com",
  projectId: "tanglish-cloud",
  storageBucket: "tanglish-cloud.firebasestorage.app",
  messagingSenderId: "194420258349",
  appId: "1:194420258349:web:97d24c1c7d8cc9e31ceaa4",
  measurementId: "G-Y7G9XNJBH6"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let words = [];
let fuse = null;

const defaultWords = [
  { wrong: "ena panra", correct: "enna panra" },
  { wrong: "saptiya", correct: "saaptiya" },
  { wrong: "epdi iruka", correct: "eppadi irukka" }
];

async function insertDefaultsIfEmpty() {
  const snap = await getDocs(collection(db,"words"));
  if(snap.empty){
    for(const item of defaultWords){
      await addDoc(collection(db,"words"), item);
    }
  }
}

insertDefaultsIfEmpty();

onSnapshot(collection(db,"words"), snapshot=>{
  words=[];
  snapshot.forEach(docSnap=>{
    words.push({id:docSnap.id,...docSnap.data()});
  });
  fuse = new Fuse(words,{keys:["wrong"],threshold:0.3});
  displayWords();
});

window.login = async function(){
  const emailValue = document.getElementById("email").value;
  const passwordValue = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, emailValue, passwordValue);
  }catch(error){
    alert(error.message);
  }
};

window.logout = async function(){
  await signOut(auth);
};

onAuthStateChanged(auth,user=>{
  if(user){
    loginScreen.style.display="none";
    mainApp.classList.remove("hidden");
  }else{
    loginScreen.style.display="flex";
    mainApp.classList.add("hidden");
  }
});

window.autoCorrect = function(){
  const input=inputText.value;
  if(!input || words.length===0) return;
  let corrected=input;

  words.forEach(w=>{
    const escaped = w.wrong.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const regex=new RegExp(`\\b${escaped}\\b`,"gi");
    corrected=corrected.replace(regex,w.correct);
  });

  outputText.innerText=corrected;
};

window.addWord = async function(){
  if(!auth.currentUser) return alert("Login required");
  const wrong=wrongWord.value.trim();
  const correct=correctWord.value.trim();
  if(!wrong||!correct) return;
  await addDoc(collection(db,"words"),{wrong,correct});
  wrongWord.value="";
  correctWord.value="";
};

window.deleteWord = async function(id){
  await deleteDoc(doc(db,"words",id));
};

window.editWord = async function(id){
  const newWrong=prompt("Edit wrong:");
  const newCorrect=prompt("Edit correct:");
  if(newWrong && newCorrect){
    await updateDoc(doc(db,"words",id),{
      wrong:newWrong,
      correct:newCorrect
    });
  }
};

function displayWords(){
  wordList.innerHTML="";
  words.forEach(w=>{
    const div=document.createElement("div");
    div.className="word-item";
    div.innerHTML=`
      <span>${w.wrong} → ${w.correct}</span>
      <div>
        <button onclick="editWord('${w.id}')">Edit</button>
        <button onclick="deleteWord('${w.id}')">Delete</button>
      </div>
    `;
    wordList.appendChild(div);
  });
}

searchBox.addEventListener("input",function(){
  suggestions.innerHTML="";
  if(!this.value || !fuse) return;
  const results=fuse.search(this.value);
  results.slice(0,5).forEach(r=>{
    const div=document.createElement("div");
    div.innerText=r.item.correct;
    div.onclick=()=>{
      searchBox.value=r.item.correct;
      suggestions.innerHTML="";
    };
    suggestions.appendChild(div);
  });
});

</script>
</body>
</html>
